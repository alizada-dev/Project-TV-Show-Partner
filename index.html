<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Ofonimeedak</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main id="root">
      <template id="movie-card">
        <section>
          <h1>
            <span class="episode-name"> </span>-
            <span class="season-No"> </span>
          </h1>
          <h2 class="episode-no"></h2>
          <h2 class="episode-code"></h2>
          <img src="./hh" alt="movie poster" />
          <details id="movie-details">
            <summary class="movie-summary"></summary>
          </details>
        </section>
      </template>
    </main>
    <footer>
      <p>API Consumed from <a href="https://tvmaze.com/">TVMaze.com</a></p>
    </footer>
    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
    <script src="episodes.js"></script>

    <!-- Loads YOUR javascript code -->
    <script src="script.js" defer></script>
  </body>
</html>
