<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Show Project | Ofonimeedak</title>
    <link href="style.css" rel="stylesheet">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
  </head>

  <body>
    <header class="header">
      <h1>Game of Thrones</h1>
    </header>

    <main id="root">

      <!-- Search box container -->
      <div class="searchbox-container">
        <label>Search <input type="text" id="search"></label>
      </div>

      <!-- Episodes container -->
      <div id="episode-container" class="episode-grid"></div>

      <!-- Template -->
      <template id="episode-card">
        <article class="episode-card">
          <h2 class="episode-title">
            <span class="episode-name"></span>
            <span class="episode-code"></span>
          </h2>
          <img class="episode-image" alt="episode image">
          <p class="episode-summary"></p>
        </article>
      </template>
    </main>

    <footer>
      <p>API Consumed from <a href="https://tvmaze.com/">TVMaze.com</a></p>
    </footer>
    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
    <script src="episodes.js"></script>

    <!-- Loads YOUR javascript code -->
    <script src="script.js" defer></script>
  </body>
</html>
